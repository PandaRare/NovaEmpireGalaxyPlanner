<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Galaxy Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #020810;
    --bg2: #050d1a;
    --panel: #0a1628;
    --panel2: #0d1e36;
    --border: #1a3a5c;
    --border2: #2a5a8c;
    --text: #c8dff5;
    --text2: #7aa8d0;
    --text3: #3d6a94;
    --accent: #00c8ff;
    --accent2: #0080cc;
    --elite: #00c8ff;
    --elite2: #006699;
    --standard: #00bfff;
    --standard2: #006699;
    --node-std: #00c8ff;
    --node-elite: #00c8ff;
    --node-hover: #ffffff;
    --edge-std: rgba(0,180,255,0.25);
    --edge-elite: rgba(0,180,255,0.25);
    --glow-std: rgba(0,200,255,0.6);
    --glow-elite: rgba(0,200,255,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 10px; letter-spacing: 1px; }

  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .tab-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .tab-btn:hover { color: var(--accent); border-color: var(--accent); }
  .tab-btn.active-std { color: var(--standard); border-color: var(--standard); background: rgba(0,180,255,0.08); }
  .tab-btn.active-elite { color: var(--elite); border-color: var(--elite); background: rgba(0,180,255,0.08); }

  .stat-pill {
    font-size: 11px;
    color: var(--text3);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 270px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
  }

  .search-wrap {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }

  .system-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .system-list::-webkit-scrollbar { width: 4px; }
  .system-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .sys-item {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(26,58,92,0.4);
    transition: background 0.15s;
    gap: 10px;
  }
  .sys-item:hover { background: var(--panel2); }
  .sys-item.selected { background: rgba(0,180,255,0.1); border-left: 2px solid var(--accent); }
  .sys-item.selected-elite { background: rgba(0,180,255,0.1); border-left: 2px solid var(--elite); }

  .sys-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-std { background: var(--node-std); box-shadow: 0 0 4px var(--node-std); }
  .dot-elite { background: var(--node-elite); box-shadow: 0 0 4px var(--node-elite); }

  .sys-name { font-size: 12px; color: var(--text); flex: 1; }
  .sys-coords { font-size: 10px; color: var(--text3); }
  .sys-layer { font-size: 10px; color: var(--text3); margin-left: auto; }

  .info-panel {
    border-top: 1px solid var(--border);
    padding: 14px;
    min-height: 160px;
    flex-shrink: 0;
  }
  .info-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .info-title.elite { color: var(--elite); }
  .info-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 11px; }
  .info-label { color: var(--text3); }
  .info-val { color: var(--text2); }
  .info-empty { color: var(--text3); font-size: 11px; padding: 10px 0; }

  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    cursor: grab;
  }
  canvas.dragging { cursor: grabbing; }

  .controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 5;
  }

  .ctrl-btn {
    width: 32px; height: 32px;
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px;
    transition: all 0.15s;
    font-family: monospace;
  }
  .ctrl-btn:hover { color: var(--accent); border-color: var(--accent); }

  .legend {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(10,22,40,0.85);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 2px;
    z-index: 5;
    font-size: 11px;
  }
  .legend-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .cluster-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(10,22,40,0.9);
    border: 1px solid var(--border2);
    padding: 8px 14px;
    border-radius: 2px;
    z-index: 5;
  }
  .badge-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .badge-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 500;
  }
  .badge-name.std { color: var(--standard); }
  .badge-name.elite { color: var(--elite); }

  .tooltip {
    position: absolute;
    background: var(--panel2);
    border: 1px solid var(--border2);
    padding: 6px 10px;
    border-radius: 2px;
    font-size: 11px;
    pointer-events: none;
    z-index: 20;
    display: none;
  }
  .tooltip-name { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--accent); margin-bottom: 3px; }
  .tooltip-name.elite { color: var(--elite); }
  .tooltip-row { color: var(--text2); font-size: 10px; }

  .cluster-tabs {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .ctab {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .ctab:hover { color: var(--text2); border-color: var(--border2); }
  .ctab.active-std { color: var(--standard); border-color: var(--standard); background: rgba(0,180,255,0.07); }
  .ctab.active-elite { color: var(--elite); border-color: var(--elite); background: rgba(0,180,255,0.07); }

  .influence-panel {
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    max-height: 320px;
  }
  .inf-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .inf-scroll { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  .inf-scroll::-webkit-scrollbar { width: 3px; }
  .inf-scroll::-webkit-scrollbar-thumb { background: var(--border2); }
  .alliance-row {
    padding: 6px 12px;
    border-bottom: 1px solid rgba(26,58,92,0.4);
    font-size: 11px;
  }
  .alliance-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }
  .alliance-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .alliance-label { font-weight: 500; color: var(--text); flex: 1; font-size: 11px; }
  .alliance-del { font-size: 10px; color: var(--text3); cursor: pointer; padding: 1px 4px; border: 1px solid transparent; border-radius: 2px; }
  .alliance-del:hover { color: #ff4444; border-color: #ff4444; }
  .alliance-stats { display: flex; gap: 10px; font-size: 10px; color: var(--text3); }
  .alliance-stat { display: flex; align-items: center; gap: 3px; }
  .hq-icon { color: #ffd700; }
  .op-icon { color: #88aaff; }
  .inf-controls {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .place-mode-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .place-btn {
    flex: 1;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 5px 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    text-align: center;
  }
  .place-btn:hover { color: var(--text2); }
  .place-btn.active-hq { color: #ffd700; border-color: #ffd700; background: rgba(255,215,0,0.08); }
  .place-btn.active-op { color: #88aaff; border-color: #88aaff; background: rgba(136,170,255,0.08); }
  .place-btn.active-rm { color: #ff6666; border-color: #ff6666; background: rgba(255,100,100,0.08); }
  .rank-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .rank-row label { color: var(--text3); font-size: 10px; white-space: nowrap; }
  .rank-row select {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 6px;
    outline: none;
    border-radius: 2px;
  }
  .add-alliance-row {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .add-alliance-row input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    border-radius: 2px;
    min-width: 0;
  }
  .add-alliance-row input:focus { border-color: var(--accent); }
  .add-btn {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .color-picker-row { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .color-swatch {
    width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.1s;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: white; }
  .place-hint {
    font-size: 10px; color: var(--text3); padding: 4px 12px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .sel-alliance-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  .sel-alliance-row label { color: var(--text3); font-size: 10px; white-space: nowrap; }
  .sel-alliance-row select {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 6px;
    outline: none;
    border-radius: 2px;
  }


  /* ── RESPONSIVE ── */
  #mobile-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border2);
    z-index: 50;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    padding: 6px 4px;
    gap: 2px;
  }
  .mob-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 9px;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 2px;
    border-radius: 4px;
    border: none;
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.15s;
  }
  .mob-btn.active { color: var(--accent); }
  .mob-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  #drawer {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border2);
    border-radius: 12px 12px 0 0;
    z-index: 40;
    max-height: 70vh;
    overflow-y: auto;
    scrollbar-width: thin;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    padding-bottom: env(safe-area-inset-bottom, 60px);
  }
  #drawer.open { transform: translateY(0); }
  .drawer-handle {
    display: flex;
    justify-content: center;
    padding: 10px;
    cursor: pointer;
  }
  .drawer-handle::after {
    content: '';
    width: 36px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
  }
  #drawer-content { padding: 0 0 8px; }

  @media (max-width: 700px) {
    body { overflow: hidden; }
    .sidebar { display: none !important; }
    #mobile-bar { display: flex; }
    #drawer { display: block; }
    .canvas-area { height: calc(100vh - 50px - 52px); }
    header { padding: 6px 10px; }
    .logo span { display: none; }
    .logo { font-size: 14px; }
    .stat-pill { display: none; }
    .header-controls { gap: 4px; }
    .tab-btn { font-size: 9px; padding: 4px 8px; }
    .legend { top: 8px; right: 8px; padding: 7px 10px; font-size: 10px; }
    .legend-title { font-size: 8px; }
    .cluster-badge { top: 8px; left: 8px; padding: 5px 10px; }
    .badge-label { font-size: 8px; }
    .badge-name { font-size: 11px; }
    .controls { bottom: 60px; right: 10px; }
    .canvas-area { height: calc(100dvh - 44px - 52px); }
  }
  @media (max-width: 400px) {
    .tab-btn { font-size: 8px; padding: 3px 5px; letter-spacing: 0; }
  }


  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 4px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

</style>
</head>
<body>

<header>
  <div class="logo">NOVA <span>Galaxy Navigation System</span></div>
  <div class="header-controls">
    <div class="stat-pill" id="node-count">— systems</div>
    <button class="tab-btn active-elite" id="btn-standard" onclick="switchMap('standard')">Elite</button>
    <button class="tab-btn" id="btn-elite135" onclick="switchMap('elite135')">Standard A</button>
    <button class="tab-btn" id="btn-elite136" onclick="switchMap('elite136')">Standard B</button>
    <button class="tab-btn" id="btn-elite137" onclick="switchMap('elite137')">Standard C</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Star Systems</div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search system..." oninput="filterList()">
    </div>
    <div class="cluster-tabs" id="layer-tabs"></div>
    <div class="system-list" id="sys-list"></div>
    <div class="info-panel" id="info-panel">
      <div class="info-empty">Select a system to view details</div>
    </div>

  <div class="influence-panel">
    <div class="inf-header">
      <span>Influence</span>
      <div style="display:flex;gap:5px;align-items:center">
        <span id="inf-mode-label" style="color:var(--text2);font-size:9px;letter-spacing:1px">MODE: OFF</span>
        <button class="add-btn" onclick="exportData()" style="padding:2px 7px;font-size:9px">↑ Export</button>
        <button class="add-btn" onclick="openImport()" style="padding:2px 7px;font-size:9px">↓ Import</button>
      </div>
    </div>
    <div class="inf-controls">
      <div class="sel-alliance-row">
        <label>Alliance:</label>
        <select id="sel-alliance" onchange="selectAlliance()">
          <option value="">-- Select --</option>
        </select>
      </div>
      <div class="place-mode-row">
        <button class="place-btn" id="btn-place-hq" onclick="setMode('hq')" title="Place HQ (1 per system per alliance)">⬡ HQ</button>
        <button class="place-btn" id="btn-place-op" onclick="setMode('op')" title="Place Outpost (max 10 per alliance)">◈ Outpost</button>
        <button class="place-btn" id="btn-place-rm" onclick="setMode('rm')" title="Remove building">✕ Remove</button>
      </div>
      <div class="rank-row" style="flex-direction:column;align-items:stretch;gap:3px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
          <span>HQ Rank: <span id="hq-rank-val" style="color:var(--text2)">1</span></span>
          <span id="hq-radius-val" style="color:var(--text3)">r=5.7</span>
        </div>
        <input type="range" id="hq-rank" min="1" max="20" value="1" step="1" oninput="updateRankDisplay('hq')">
      </div>
      <div class="rank-row" style="flex-direction:column;align-items:stretch;gap:3px;margin-top:4px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
          <span>OP Rank: <span id="op-rank-val" style="color:var(--text2)">1</span></span>
          <span id="op-radius-val" style="color:var(--text3)">r=5.7</span>
        </div>
        <input type="range" id="op-rank" min="1" max="20" value="1" step="1" oninput="updateRankDisplay('op')">
      </div>
    </div>
    <div class="inf-scroll" id="alliance-list"></div>
    <div class="add-alliance-row">
      <input type="text" id="new-alliance-name" placeholder="Alliance name..." maxlength="16">
      <button class="add-btn" onclick="addAlliance()">+ Add</button>
    </div>
    <div class="color-picker-row" id="color-picker" style="padding:0 12px 8px"></div>
    <div class="place-hint" id="place-hint" style="display:none"></div>
  </div>


    <div style="border-top:1px solid var(--border);flex-shrink:0">
      <div class="inf-header" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <span>Pathfinder</span>
        <span style="color:var(--text3);font-size:9px;letter-spacing:1px">▾</span>
      </div>
      <div id="path-panel" style="padding:10px 12px;display:block">
        <div style="font-size:10px;color:var(--text3);margin-bottom:8px">Select systems in list with Shift to set path</div>
        <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px">

function getNodes() { return (RAW[currentMap] || RAW.standard).nodes; }
function getEdges() { return (RAW[currentMap] || RAW.standard).edges; }
function isElite() { return currentMap === 'standard'; } // 'standard' key = Elite Galaxy map

function toScreen(wx, wz) {
  const cx = canvas.width / 2 + camera.x;
  const cy = canvas.height / 2 + camera.y;
  return { x: cx + wx * camera.scale, y: cy - wz * camera.scale };
}

function toWorld(sx, sy) {
  const cx = canvas.width / 2 + camera.x;
  const cy = canvas.height / 2 + camera.y;
  return { x: (sx - cx) / camera.scale, z: -(sy - cy) / camera.scale };
}

function resize() {
  const area = document.getElementById('canvas-area');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  draw();
}

function drawGrid() {
  ctx.save();
  const step = camera.scale * 10;
  const ox = (canvas.width / 2 + camera.x) % step;
  const oy = (canvas.height / 2 + camera.y) % step;
  ctx.strokeStyle = 'rgba(26,58,92,0.3)';
  ctx.lineWidth = 0.5;
  for (let x = ox; x < canvas.width; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
  for (let y = oy; y < canvas.height; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Starfield bg
  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Tiny stars
  const seed = 42;
  for (let i = 0; i < 200; i++) {
    const sx = ((i * 7919 + seed * 997) % canvas.width);
    const sy = ((i * 6271 + seed * 1013) % canvas.height);
    const r = i % 3 === 0 ? 1 : 0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,210,255,${0.1 + (i % 5) * 0.06})`;

      ctx.lineTo(pos.x + 4, pos.y);
      ctx.lineTo(pos.x, pos.y + 5);
      ctx.lineTo(pos.x - 4, pos.y);
      ctx.closePath();
      ctx.fill();
      if (isSelected) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 9, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else {
      // Normal glow
      const glowR = isSelected ? 16 : 10;
      const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
      glow.addColorStop(0, isSelected ? 'rgba(255,255,255,0.4)' : 'rgba(0,200,255,0.25)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
      ctx.fill();
      // Dot
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      // Ring for selected
      if (isSelected) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 9, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;

    // Label
    if (camera.scale > 8) {
      ctx.font = isSelected ? '500 11px Orbitron, monospace' : '10px Share Tech Mono, monospace';
      ctx.fillStyle = isSelected ? '#ffffff' : 'rgba(100,200,255,0.85)';
      ctx.textAlign = 'center';
      ctx.fillText(name, pos.x, pos.y - r - 4);
    } else if (camera.scale > 5) {
      ctx.font = '9px Share Tech Mono, monospace';
      ctx.fillStyle = 'rgba(100,200,255,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText(name, pos.x, pos.y - r - 3);
    }
  });

  // Draw path
  drawPath();
  // Draw buildings on top of nodes
  drawBuildings();
}

function buildList() {
  const q = document.getElementById('search').value.toLowerCase();
  const nodes = getNodes();
  const layer = activeLayer;
  filteredNodes = nodes.filter(n => {
    const [name] = n;
    return name.toLowerCase().includes(q);
  });

  const list = document.getElementById('sys-list');
  list.innerHTML = '';
  const elite = isElite();

  filteredNodes.forEach(n => {
    const [name, wx, wz] = n;
    const div = document.createElement('div');
    div.className = 'sys-item';
    if (selectedNode && selectedNode[0] === name && selectedNode[1] === wx && selectedNode[2] === wz) {
      div.className += ' selected';
    }
    const starType = n[3];
    const isBH = starType === 1;
    const isNS = starType === 2;
    div.innerHTML = `
      <div class="sys-dot dot-std" style="${isBH ? 'background:#6600cc;box-shadow:0 0 6px #9933ff' : isNS ? 'background:#00ffee;box-shadow:0 0 6px #00ffee' : ''}"></div>
      <div class="sys-name" style="${isBH ? 'color:#bb88ff' : isNS ? 'color:#00ffee' : ''}">${name}${isBH ? ' ●' : isNS ? ' ◆' : ''}</div>
    `;
    div.onclick = (e) => {
      if (e.shiftKey) {
        setPathTo(n);
      } else if (e.ctrlKey || e.metaKey) {
        setPathFrom(n);
      } else {
        selectNode(n);
        document.getElementById('info-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    };
    list.appendChild(div);
  });
}

// Mouse interaction
canvas.addEventListener('mousedown', e => {
  lastMouse = { x: e.clientX, y: e.clientY }; // always track for click detection
  if (e.button === 2 || !placeMode) { // right-click OR left when not placing
    dragging = true;
    canvas.classList.add('dragging');
  }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    camera.x += e.clientX - lastMouse.x;
    camera.y += e.clientY - lastMouse.y;
    lastMouse = { x: e.clientX, y: e.clientY };
    draw();
  }

  // Tooltip
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = toWorld(mx, my);
  const nodes = getNodes();
  const elite = isElite();
  let closest = null, minDist = 12 / camera.scale;

  nodes.forEach(n => {
    const dx = n[1] - world.x, dz = n[2] - world.z;
    const d = Math.sqrt(dx*dx + dz*dz);
    if (d < minDist) { minDist = d; closest = n; }
  });

  const tt = document.getElementById('tooltip');
  if (closest) {
    tt.style.display = 'block';
    tt.style.left = (mx + 12) + 'px';
    tt.style.top = (my - 10) + 'px';
    document.getElementById('tt-name').textContent = closest[0];
    document.getElementById('tt-name').className = 'tooltip-name';
    document.getElementById('tt-pos').textContent = `x: ${closest[1].toFixed(2)}  z: ${closest[2].toFixed(2)}`;
    const _st = closest[3]; document.getElementById('tt-layer').textContent = _st === 1 ? '● Black Hole' : _st === 2 ? '◆ Neutron Star' : '◆ System';
  } else {
    tt.style.display = 'none';
  }
});

canvas.addEventListener('mouseup', () => { dragging = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('mouseleave', () => { dragging = false; canvas.classList.remove('dragging'); document.getElementById('tooltip').style.display = 'none'; });

canvas.addEventListener('click', e => {
  if (Math.abs(e.clientX - (lastMouse?.x || e.clientX)) > 3) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const world = toWorld(mx, my);

  // Handle influence placement first
  if (placeMode) {
    handleInfluenceClick(world.x, world.z);
    return;
  }

  // Left click: check if near a building marker (15px), or deselect
  if (selectedAllianceId) {
    const rect2 = canvas.getBoundingClientRect();
    const mx2 = e.clientX - rect2.left, my2 = e.clientY - rect2.top;
    const alliance = getSelectedAlliance();
    let hit = false;
    if (alliance) {
      // Check HQ
      const clickMb = getMapBuildings(alliance);
      if (clickMb.hq) {
        const hp = toScreen(clickMb.hq.x, clickMb.hq.z);
        if (Math.hypot(mx2 - hp.x, my2 - hp.y) < 14) {
          // Click on HQ → set HQ mode and sync slider to current rank
          setMode('hq');
          document.getElementById('hq-rank').value = getMapBuildings(alliance).hq?.rank ?? 1;
          updateRankDisplay('hq');
          hit = true;
        }
      }
      // Check outposts
      if (!hit) {
        for (const op of clickMb.outposts) {
          const op2 = toScreen(op.x, op.z);
          if (Math.hypot(mx2 - op2.x, my2 - op2.y) < 14) {
            setMode('op');
            document.getElementById('op-rank').value = op.rank;
            updateRankDisplay('op');
            hit = true;
            break;
          }
        }
      }
    }
    if (!hit && selectedNode) {
      selectedNode = null;
      document.getElementById('info-panel').innerHTML = '<div class="info-empty">Select a system to view details</div>';
      buildList();
      draw();
    }
  } else if (selectedNode) {
    selectedNode = null;
    document.getElementById('info-panel').innerHTML = '<div class="info-empty">Select a system to view details</div>';
    buildList();
    draw();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const wx = (mx - canvas.width/2 - camera.x) / camera.scale;
  const wy = (my - canvas.height/2 - camera.y) / camera.scale;
  camera.scale = Math.min(Math.max(camera.scale * factor, 2), 60);
  camera.x = mx - canvas.width/2 - wx * camera.scale;
  camera.y = my - canvas.height/2 - wy * camera.scale;
  draw();
}, { passive: false });

// Touch support
let touchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging = true; lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
  if (e.touches.length === 2) { touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    camera.x += e.touches[0].clientX - lastMouse.x;
    camera.y += e.touches[0].clientY - lastMouse.y;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    draw();
  }
  if (e.touches.length === 2 && touchDist) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    camera.scale = Math.min(Math.max(camera.scale * (d / touchDist), 2), 60);
    touchDist = d;
    draw();
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', () => { dragging = false; touchDist = null; });

});

const HQ_INF = {1:500,2:550,3:600,4:650,5:700,6:750,7:800,8:850,9:900,10:950,11:1000,12:1050,13:1100,14:1150,15:1200,16:1250,17:1300,18:1350,19:1400,20:1500};
const OP_INF = {1:300,2:325,3:350,4:375,5:400,6:425,7:450,8:475,9:500,10:525,11:550,12:575,13:600,14:625,15:650,16:675,17:700,18:725,19:750,20:800};
const INF_MIN = 5.5;   // rank 1 minimum range
const INF_MAX = 7.5;   // max rank influence
function infToRadius(rank) {
  // Linear interpolation: rank 1 → INF_MIN, rank 20 → INF_MAX
  return INF_MIN + (INF_MAX - INF_MIN) * (rank - 1) / 19;
}
// Neutron stars encoded in data as n[3]===2, black holes as n[3]===1

  '#e84040','#e87a20','#d4c020','#40c840','#20b8c0',

];

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}



function drawEdges() {
  const nodes = getNodes();
  const edges = getEdges();
  const elite = isElite();
  const edgeColor = 'rgba(100,180,255,0.22)';

  ctx.strokeStyle = edgeColor;
  ctx.lineWidth = 0.8;
  edges.forEach(([a, b]) => {
    if (a >= nodes.length || b >= nodes.length) return;
    const pa = toScreen(nodes[a][1], nodes[a][2]);
    const pb = toScreen(nodes[b][1], nodes[b][2]);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
  });
}

function drawInfluence() {
  if (alliances.length === 0) return;
  
  alliances.forEach(a => {
    const mb = getMapBuildings(a);
    // Draw outpost zones (behind HQ zone)
    mb.outposts.forEach(op => {
      const pos = toScreen(op.x, op.z);
      const r = infToRadius(op.rank) * camera.scale;
      const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
      grad.addColorStop(0, hexToRgba(a.color, 0.20));
      grad.addColorStop(0.6, hexToRgba(a.color, 0.12));
      grad.addColorStop(1, hexToRgba(a.color, 0.0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fill();
      // Dashed border
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = hexToRgba(a.color, 0.5);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    });

    // Draw HQ zone (on top)
    if (mb.hq) {
      const pos = toScreen(mb.hq.x, mb.hq.z);
      const r = infToRadius(mb.hq.rank) * camera.scale;
      const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
      grad.addColorStop(0, hexToRgba(a.color, 0.30));
      grad.addColorStop(0.5, hexToRgba(a.color, 0.18));
      grad.addColorStop(1, hexToRgba(a.color, 0.0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fill();
      // Solid border
      ctx.strokeStyle = hexToRgba(a.color, 0.7);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  });
}

function drawBuildings() {
  alliances.forEach(a => {
    const mb = getMapBuildings(a);
    // Draw outpost markers
    mb.outposts.forEach(op => {
      const pos = toScreen(op.x, op.z);
      // Outer ring
      ctx.strokeStyle = a.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
      ctx.stroke();
      // Inner dot
      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
      ctx.fill();
      // Cross
      ctx.strokeStyle = a.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pos.x - 5, pos.y); ctx.lineTo(pos.x + 5, pos.y);
      ctx.moveTo(pos.x, pos.y - 5); ctx.lineTo(pos.x, pos.y + 5);
      ctx.stroke();
      // Rank label
      if (camera.scale > 5) {
        ctx.font = '8px Orbitron, monospace';
        ctx.fillStyle = a.color;
        ctx.textAlign = 'center';
        ctx.fillText(`R${op.rank}`, pos.x, pos.y + 18);
      }
    });

    // Draw HQ marker
    if (mb.hq) {
      const pos = toScreen(mb.hq.x, mb.hq.z);
      // Hexagon shape
      ctx.strokeStyle = a.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (i * Math.PI / 3) - Math.PI / 6;
        const px = pos.x + 10 * Math.cos(angle);
        const py = pos.y + 10 * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      // Fill
      ctx.fillStyle = hexToRgba(a.color, 0.3);
      ctx.fill();
      // Center star
      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      // HQ label
      if (camera.scale > 4) {
        ctx.font = '9px Orbitron, monospace';
        ctx.fillStyle = '#ffd700';
        ctx.textAlign = 'center';
        ctx.fillText('HQ', pos.x, pos.y - 14);
        if (camera.scale > 6) {
          ctx.font = '8px Share Tech Mono, monospace';
          ctx.fillStyle = a.color;
          ctx.fillText(a.name, pos.x, pos.y + 20); // HQ label
          ctx.fillStyle = 'rgba(255,215,0,0.8)';
          ctx.fillText(`R${mb.hq.rank}`, pos.x, pos.y + 29);
        }
      }
    }
  });
}


function updateRankDisplay(type) {
  const rank = parseInt(document.getElementById(type + '-rank').value);
  const radius = INF_MIN + (INF_MAX - INF_MIN) * (rank - 1) / 19;
  document.getElementById(type + '-rank-val').textContent = rank;
  document.getElementById(type + '-radius-val').textContent = 'r=' + radius.toFixed(1);
  // Redraw if a building of this type is being previewed
  if (placeMode === type || (type === 'hq' && placeMode === 'hq') || (type === 'op' && placeMode === 'op')) {
    draw();
  }
}

function systemOccupied(sysName) {
  return alliances.some(a => {
    const mb = getMapBuildings(a);
    if (mb.hq && mb.hq.sysName === sysName) return true;
    return mb.outposts.some(o => o.sysName === sysName);
  });
}

function handleInfluenceClick(worldX, worldZ) {
  if (!placeMode || !selectedAllianceId) {
    if (placeMode && !selectedAllianceId) {
      const hint = document.getElementById('place-hint');
      hint.textContent = '⚠ Select an alliance first!';
      hint.style.color = '#ff8844';
      setTimeout(() => { hint.style.color = ''; if (placeMode) hint.textContent = placeMode === 'hq' ? 'Click a system to place HQ (1 per system)' : placeMode === 'op' ? 'Click a system to place Outpost (max 10)' : 'Click a system to remove building'; }, 2000);
    }
    return false;
  }

  const allNodes = getNodes();
  let closest = null, minDist = Infinity;
  allNodes.forEach(n => {
    const dx = n[1] - worldX, dz = n[2] - worldZ;
    const d = Math.sqrt(dx*dx + dz*dz);
    if (d < minDist) { minDist = d; closest = n; }
  });
  if (!closest) return false;

  const alliance = getSelectedAlliance();
  const sysName = closest[0];
  const x = closest[1], z = closest[2];
  const mb = getMapBuildings(alliance);

  if (placeMode === 'hq') {
    const hqRank = parseInt(document.getElementById('hq-rank').value);
    // Only 1 HQ per alliance
    if (closest[3] === 1) { showHint('⚠ Trou noir : impossible de construire ici !'); return false; }
    if (closest[3] === 2) { showHint('⚠ Neutron Star: cannot build here!'); return false; }
    if (mb.hq) { showHint('⚠ This alliance already has a HQ! Remove it first.'); return false; }
    if (systemOccupied(sysName)) { showHint('⚠ A building already exists on this system!'); return false; }
    mb.hq = { sysName, x, z, rank: hqRank };
    renderAllianceList();
    draw();
    return true;

  } else if (placeMode === 'op') {
    const opRank = parseInt(document.getElementById('op-rank').value);
    // Max 10 outposts per alliance
    if (closest[3] === 1) { showHint('⚠ Trou noir : impossible de construire ici !'); return false; }
    if (closest[3] === 2) { showHint('⚠ Neutron Star: cannot build here!'); return false; }
    if (mb.outposts.length >= 10) { showHint('⚠ Max 10 Outposts per alliance!'); return false; }
    if (systemOccupied(sysName)) { showHint('⚠ A building already exists on this system!'); return false; }
    mb.outposts.push({ sysName, x, z, rank: opRank });
    renderAllianceList();
    draw();
    return true;

  } else if (placeMode === 'rm') {
    const rmb = getMapBuildings(alliance);
    if (rmb.hq && rmb.hq.sysName === sysName) {
      rmb.hq = null;
      renderAllianceList(); draw(); return true;
    }
    const opIdx = rmb.outposts.findIndex(o => o.sysName === sysName);
    if (opIdx !== -1) {
      rmb.outposts.splice(opIdx, 1);
      renderAllianceList(); draw(); return true;
    }
    showHint('⚠ No building found here for this alliance');
    return false;
  }
  return false;
}

function showHint(msg) {
  const hint = document.getElementById('place-hint');
  const prev = hint.textContent;
  hint.textContent = msg;
  hint.style.color = '#ff8844';
  setTimeout(() => {
    hint.style.color = '';
    if (placeMode === 'hq') hint.textContent = 'Click a system to place HQ (1 per system)';
    else if (placeMode === 'op') hint.textContent = 'Click a system to place Outpost (max 10)';
    else if (placeMode === 'rm') hint.textContent = 'Click a system to remove building';
  }, 2500);
}

function isMobile() { return window.innerWidth <= 700; }

function mobTab(tab) {
  if (!isMobile()) return;
  document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mob-' + tab).classList.add('active');

  if (tab === 'map') {
    closeDrawer();
    currentDrawerTab = null;
    return;
  }

  currentDrawerTab = tab;
  const drawer = document.getElementById('drawer');
  const content = document.getElementById('drawer-content');

  if (tab === 'systems') {
    // Clone sidebar system list + search + info panel
    const searchHtml = `<div style="padding:8px 12px 4px"><input type="text" placeholder="Search system..." oninput="buildMobList()" id="mob-search" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:Share Tech Mono,monospace;font-size:12px;padding:6px 10px;border-radius:4px;outline:none"></div>`;
    const listHtml = `<div id="mob-sys-list" style="max-height:35vh;overflow-y:auto;scrollbar-width:thin"></div>`;
    const infoHtml = `<div id="mob-info-panel" style="padding:12px 14px;border-top:1px solid var(--border);min-height:80px"><div class="info-empty">Select a system</div></div>`;
    content.innerHTML = searchHtml + listHtml + infoHtml;
    buildMobList();
  } else if (tab === 'influence') {
    // Clone influence panel
    const sidebar = document.querySelector('.influence-panel');
    content.innerHTML = `<div style="padding:0 0 8px">${sidebar ? sidebar.innerHTML : ''}</div>`;
    // Re-bind events on cloned elements
    const sel = content.querySelector('#sel-alliance');
    if (sel) sel.onchange = selectAlliance;
    content.querySelectorAll('[onclick]').forEach(el => {
      const fn = el.getAttribute('onclick');
      el.onclick = () => eval(fn);
    });
    content.querySelectorAll('input[type=range]').forEach(el => {
      el.oninput = () => updateRankDisplay(el.id.replace('-rank',''));
    });
    content.querySelectorAll('input[type=text]').forEach(el => {
      if (el.id === 'new-alliance-name') el.id = 'mob-new-alliance-name';
    });
    const addBtn = content.querySelector('.add-btn');
    if (addBtn) addBtn.onclick = () => {
      const inp = content.querySelector('#mob-new-alliance-name') || content.querySelector('#new-alliance-name');
      const mainInp = document.getElementById('new-alliance-name');
      if (mainInp && inp) mainInp.value = inp.value;
      addAlliance();
      inp.value = '';
    };
    // Sync selects
    const mainSel = document.getElementById('sel-alliance');
    if (sel && mainSel) sel.innerHTML = mainSel.innerHTML;
  }

  drawer.classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

function buildMobList() {
  const listEl = document.getElementById('mob-sys-list');
  if (!listEl) return;
  const searchEl = document.getElementById('mob-search');
  const q = searchEl ? searchEl.value.toLowerCase() : '';
  const nodes = getNodes();
  const filtered = nodes.filter(n => n[0].toLowerCase().includes(q));
  listEl.innerHTML = '';
  filtered.forEach(n => {
    const [name, wx, wz, starType] = n;
    const isBH = starType === 1, isNS = starType === 2;
    const div = document.createElement('div');
    div.className = 'sys-item';
    if (selectedNode && selectedNode[0] === name) div.className += ' selected';
    div.innerHTML = `<div class="sys-dot dot-std" style="${isBH?'background:#6600cc;box-shadow:0 0 6px #9933ff':isNS?'background:#00ffee;box-shadow:0 0 6px #00ffee':''}"></div><div class="sys-name" style="${isBH?'color:#bb88ff':isNS?'color:#00ffee':''}">${name}${isBH?' ●':isNS?' ◆':''}</div>`;
    div.onclick = () => {
      selectNode(n);
      const infoEl = document.getElementById('mob-info-panel');
      if (infoEl) infoEl.innerHTML = document.getElementById('info-panel').innerHTML;
    };
    listEl.appendChild(div);
  });
}

function showToast(msg, color) {
  const t = document.getElementById('ei-toast');
  if (!t) return;
  t.textContent = msg;
  t.style.color = color || 'var(--accent)';

function exportData() {
  const payload = {
    version: 1,
    map: currentMap,
    alliances: alliances.map(a => ({
      id: a.id,
      name: a.name,
      color: a.color,
      maps: a.maps || {}
    })),
    allianceCounter
  };
  const txt = JSON.stringify(payload);
  document.getElementById('ei-textarea').value = txt;
  document.getElementById('ei-modal').style.display = 'flex';
  document.getElementById('ei-title').textContent = 'Export — copy this text';
  document.getElementById('ei-textarea').readOnly = true;
  document.getElementById('ei-textarea').select();
  document.getElementById('ei-import-btn').style.display = 'none';
  document.getElementById('ei-copy-btn').style.display = 'inline-block';
}

function openImport() {
  document.getElementById('ei-textarea').value = '';
  document.getElementById('ei-textarea').readOnly = false;
  document.getElementById('ei-modal').style.display = 'flex';
  document.getElementById('ei-title').textContent = 'Import — paste your text';
  document.getElementById('ei-import-btn').style.display = 'inline-block';
  document.getElementById('ei-copy-btn').style.display = 'none';
  document.getElementById('ei-textarea').focus();
}

function closeEiModal() {
  document.getElementById('ei-modal').style.display = 'none';
}

function copyExport() {
  const ta = document.getElementById('ei-textarea');
  ta.select();
  try {
    navigator.clipboard.writeText(ta.value).then(() => showToast('✓ Copied!'));
  } catch(e) {
    document.execCommand('copy');
    showToast('✓ Copied!');
  }
}

function doImport() {
  const txt = document.getElementById('ei-textarea').value.trim();
  if (!txt) { showToast('✗ Empty — paste data first', '#ff4444'); return; }
  try {
    const data = JSON.parse(txt);
    if (!data.version || !Array.isArray(data.alliances)) {
      showToast('✗ Invalid format', '#ff4444'); return;
    }
    if (alliances.length > 0 && !confirm('Replace current ' + alliances.length + ' alliance(s) with ' + data.alliances.length + ' imported?')) return;
    alliances = data.alliances.map(a => ({ id: a.id, name: a.name, color: a.color, maps: a.maps || {} }));
    allianceCounter = data.allianceCounter || Math.max(0, ...alliances.map(a => a.id));
    selectedAllianceId = alliances.length > 0 ? alliances[0].id : null;
    if (data.map && data.map !== currentMap) switchMap(data.map);
    else { refreshAllianceSelector(); renderAllianceList(); draw(); }
    closeEiModal();
    showToast('✓ Imported ' + alliances.length + ' alliance(s)');
  } catch(err) {
    showToast('✗ Parse error: ' + err.message.slice(0,30), '#ff4444');
  }
}


// ── PATHFINDING ──

function buildAdjacency() {
  const nodes = getNodes();
  const edges = getEdges();
  const adj = Array.from({length: nodes.length}, () => []);
  edges.forEach(([a, b]) => { adj[a].push(b); adj[b].push(a); });
  return adj;
}

function bfsPath(fromIdx, toIdx) {
  const nodes = getNodes();
  if (fromIdx === toIdx) return [fromIdx];
  const adj = buildAdjacency();
  const visited = new Array(nodes.length).fill(false);
  const parent = new Array(nodes.length).fill(-1);
  const queue = [fromIdx];
  visited[fromIdx] = true;
  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur === toIdx) break;
    for (const nb of adj[cur]) {
      if (!visited[nb]) {
        visited[nb] = true;
        parent[nb] = cur;
        queue.push(nb);
      }
    }
  }
  if (!visited[toIdx]) return null; // no path
  const path = [];
  let cur = toIdx;
  while (cur !== -1) { path.unshift(cur); cur = parent[cur]; }
  return path;
}

function findNodeIndex(name) {
  const nodes = getNodes();
  return nodes.findIndex(n => n[0] === name);
}

function setPathFrom(n) {
  pathFrom = n;
  pathTo = null;
  pathResult = [];
  updatePathUI();
  draw();
}

function setPathTo(n) {
  pathTo = n;
  if (pathFrom && pathTo) {
    const fi = findNodeIndex(pathFrom[0]);
    const ti = findNodeIndex(pathTo[0]);
    if (fi !== -1 && ti !== -1) {
      const path = bfsPath(fi, ti);
      pathResult = path || [];
      updatePathUI();
    }
  }
  draw();
}

function clearPath() {
  pathFrom = null; pathTo = null; pathResult = [];
  updatePathUI();
  document.getElementById('path-from-label').textContent = '—';
  document.getElementById('path-to-label').textContent = '—';
  draw();
}

function updatePathUI() {
  const fromEl = document.getElementById('path-from-label');
  const toEl = document.getElementById('path-to-label');
  const lenEl = document.getElementById('path-length');
  const listEl = document.getElementById('path-list');
  if (fromEl && pathFrom) fromEl.textContent = pathFrom[0];
  if (toEl && pathTo) toEl.textContent = pathTo[0];
  if (lenEl) {
    if (pathResult.length > 0) {
      lenEl.textContent = (pathResult.length - 1) + ' jump(s)';
    } else if (pathFrom && pathTo) {
      lenEl.textContent = 'No path found';
    } else {
      lenEl.textContent = '';
    }
  }
  if (listEl && pathResult.length > 0) {
    const nodes = getNodes();
    listEl.innerHTML = pathResult.map((idx, i) => {
      const n = nodes[idx];
      return '<div style="display:flex;align-items:center;gap:6px;padding:2px 0">' +
        '<span style="color:var(--text3);font-size:9px;min-width:14px">' + i + '</span>' +
        '<span style="font-size:11px;color:' + (i === 0 ? '#40cc80' : i === pathResult.length-1 ? '#ff8844' : 'var(--text)') + '">' + n[0] + '</span>' +
        '</div>';
    }).join('');
  } else if (listEl) {
    listEl.innerHTML = '';
  }
}

function drawPath() {
  if (pathResult.length < 2) {
    // Just highlight endpoints
    const nodes = getNodes();
    if (pathFrom) {
      const pos = toScreen(pathFrom[1], pathFrom[2]);
      ctx.strokeStyle = '#40cc80';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 10, 0, Math.PI*2);
      ctx.stroke();
    }
    if (pathTo) {
      const pos = toScreen(pathTo[1], pathTo[2]);
      ctx.strokeStyle = '#ff8844';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 10, 0, Math.PI*2);
      ctx.stroke();
    }
    return;
  }
  const nodes = getNodes();
  // Draw path lines
  ctx.strokeStyle = '#ffdd44';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 3]);
  ctx.beginPath();
  pathResult.forEach((idx, i) => {
    const n = nodes[idx];
    const pos = toScreen(n[1], n[2]);
    if (i === 0) ctx.moveTo(pos.x, pos.y);
    else ctx.lineTo(pos.x, pos.y);
  });
  ctx.stroke();
  ctx.setLineDash([]);
  // Highlight nodes
  pathResult.forEach((idx, i) => {
    const n = nodes[idx];
    const pos = toScreen(n[1], n[2]);
    const isEnd = i === 0 || i === pathResult.length - 1;
    ctx.strokeStyle = i === 0 ? '#40cc80' : i === pathResult.length-1 ? '#ff8844' : '#ffdd44';
    ctx.lineWidth = isEnd ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, isEnd ? 10 : 7, 0, Math.PI*2);
    ctx.stroke();
    if (camera.scale > 5 && isEnd) {
      ctx.font = '9px Orbitron,monospace';
      ctx.fillStyle = i === 0 ? '#40cc80' : '#ff8844';
      ctx.textAlign = 'center';
      ctx.fillText(i === 0 ? 'FROM' : 'TO', pos.x, pos.y - 14);
    }
  });
}
